apiVersion: v1
kind: Secret
metadata:
  name: odin-secrets
  labels:
    app.kubernetes.io/name: {{ include "odin.name" . }}
type: Opaque
stringData:
  ODIN_ADMIN_PASSWORD: {{ .Values.odin.adminPassword | quote }}
  ODIN_JWT_SECRET: {{ .Values.odin.jwtSecret | quote }}
  ODIN_GIT_TOKEN: {{ .Values.odin.gitToken | quote }}
  MYSQL_ROOT_PASSWORD: {{ .Values.mysql.rootPassword | quote }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: odin-config
  labels:
    app.kubernetes.io/name: {{ include "odin.name" . }}
data:
  ODIN_ADMIN_USER: {{ .Values.odin.adminUser | quote }}
  ODIN_GIT_PUSH: {{ .Values.odin.gitPush | quote }}
  ODIN_GIT_REPO: {{ .Values.odin.gitRepo | quote }}
  ODIN_GIT_BRANCH: {{ .Values.odin.gitBranch | quote }}
  MYSQL_HOST: {{ .Values.mysql.host | quote }}
  MYSQL_PORT: {{ .Values.mysql.port | quote }}
  MYSQL_ROOT_USER: {{ .Values.mysql.rootUser | quote }}
  MYSQL_APP_USER: {{ .Values.mysql.appUser | quote }}
  API_URL: {{ .Values.odin.apiUrl | quote }}
