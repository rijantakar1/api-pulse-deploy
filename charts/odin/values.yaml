imageRegistry: 253155928537.dkr.ecr.us-east-1.amazonaws.com

ecr:
  accountId: "253155928537"
  region: us-east-1

imagePullPolicy: Always

imagePullSecrets:
  enabled: true
  name: ecr-pull

images:
  api:
    repository: odin-api
    tag: 20260717-7f8d6c1
  ui:
    repository: odin-ui
    tag: 20260717-7f8d6c1

replicaCount:
