imageRegistry: 253155928537.dkr.ecr.us-east-1.amazonaws.com

ecr:
  accountId: "253155928537"
  region: us-east-1

imagePullPolicy: IfNotPresent

imagePullSecrets:
  enabled: true
  name: ecr-pull

images:
  api:
    repository: odin-api
    tag: 20260717-276df1d
  ui:
    repository: odin-ui
    tag: 20260717-ea56343

replicaCount:
  api: 1
  ui: 1

service:
  api:
    port: 4100
  ui:
    port: 80

odin:
  adminUser: odin
  adminPassword: odin-admin
  jwtSecret: odin-dev-jwt-secret
  # Cluster pods have no SSH / interactive HTTPS creds. Keep false unless ODIN_GIT_TOKEN is set.
  # For live pins in the Minikube demo, run odin-api locally (see docs/ODIN.md).
  gitPush: "false"
  gitRepo: https://github.com/cd-demo/api-pulse-deploy.git
  gitBranch: main
  gitToken: ""
  apiUrl: "http://localhost:4100"

mysql:
  host: mysql.api-pulse.svc.cluster.local
  port: "3306"
  rootUser: root
  rootPassword: root
  appUser: apipulse
