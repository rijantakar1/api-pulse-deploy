apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth-service
  labels:
    app.kubernetes.io/name: {{ include "api-pulse.name" . }}
    app: auth-service
spec:
  replicas: {{ .Values.replicaCount.auth }}
  selector:
    matchLabels:
      app: auth-service
  template:
    metadata:
      labels:
        app: auth-service
    spec:
      {{- include "api-pulse.imagePullSecrets" . | nindent 6 }}
      containers:
        - name: auth-service
          image: {{ include "api-pulse.auth.image" . }}
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          ports:
            - containerPort: 4001
          env:
            - name: PORT
              value: "4001"
            - name: AUTH_VERSION
              valueFrom:
                configMapKeyRef:
                  name: api-pulse-config
                  key: AUTH_VERSION
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: api-pulse-config
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: api-pulse-config
                  key: DB_PORT
            - name: DB_USER
              valueFrom:
                configMapKeyRef:
                  name: api-pulse-config
                  key: DB_USER
            - name: REGISTRY_DB
              valueFrom:
                configMapKeyRef:
                  name: api-pulse-config
                  key: REGISTRY_DB
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: api-pulse-secrets
                  key: DB_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: api-pulse-secrets
                  key: JWT_SECRET
          readinessProbe:
            httpGet:
              path: /health
              port: 4001
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 4001
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: auth-service
  labels:
    app: auth-service
spec:
  selector:
    app: auth-service
  ports:
    - port: {{ .Values.service.auth.port }}
      targetPort: {{ .Values.service.auth.targetPort }}
      name: http
