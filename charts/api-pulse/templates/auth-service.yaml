{{- $root := . -}}
{{- range $tag := .Values.versionsActive.auth }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "api-pulse.versionedName" (dict "service" "auth" "tag" $tag) }}
  labels:
    app.kubernetes.io/name: {{ include "api-pulse.name" $root }}
    app: auth-service
    version: {{ $tag | quote }}
spec:
  replicas: {{ $root.Values.replicaCount.auth }}
  selector:
    matchLabels:
      app: auth-service
      version: {{ $tag | quote }}
  template:
    metadata:
      labels:
        app: auth-service
        version: {{ $tag | quote }}
    spec:
      {{- include "api-pulse.imagePullSecrets" $root | nindent 6 }}
      containers:
        - name: auth-service
          image: {{ include "api-pulse.image" (dict "root" $root "repository" $root.Values.images.auth.repository "tag" $tag) }}
          imagePullPolicy: {{ $root.Values.imagePullPolicy }}
          ports:
            - containerPort: 4001
          env:
            - name: PORT
              value: "4001"
            - name: AUTH_VERSION
              value: {{ $tag | quote }}
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: api-pulse-secrets
                  key: JWT_SECRET
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: api-pulse-config
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: api-pulse-config
                  key: DB_PORT
            - name: DB_USER
              valueFrom:
                configMapKeyRef:
                  name: api-pulse-config
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: api-pulse-secrets
                  key: DB_PASSWORD
            - name: REGISTRY_DB
              valueFrom:
                configMapKeyRef:
                  name: api-pulse-config
                  key: REGISTRY_DB
          readinessProbe:
            httpGet:
              path: /health
              port: 4001
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "api-pulse.versionedName" (dict "service" "auth" "tag" $tag) }}
  labels:
    app: auth-service
    version: {{ $tag | quote }}
spec:
  selector:
    app: auth-service
    version: {{ $tag | quote }}
  ports:
    - port: {{ $root.Values.service.auth.port }}
      targetPort: {{ $root.Values.service.auth.targetPort }}
      name: http
{{- end }}
