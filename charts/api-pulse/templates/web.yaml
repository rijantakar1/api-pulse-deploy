{{- $root := . -}}
{{- range $tag := .Values.versionsActive.web }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "api-pulse.versionedName" (dict "service" "web" "tag" $tag) }}
  labels:
    app.kubernetes.io/name: {{ include "api-pulse.name" $root }}
    app: web
    version: {{ $tag | quote }}
spec:
  replicas: {{ $root.Values.replicaCount.web }}
  selector:
    matchLabels:
      app: web
      version: {{ $tag | quote }}
  template:
    metadata:
      labels:
        app: web
        version: {{ $tag | quote }}
    spec:
      {{- include "api-pulse.imagePullSecrets" $root | nindent 6 }}
      containers:
        - name: web
          image: {{ include "api-pulse.image" (dict "root" $root "repository" $root.Values.images.web.repository "tag" $tag) }}
          imagePullPolicy: {{ $root.Values.imagePullPolicy }}
          ports:
            - containerPort: 80
          env:
            - name: APP_VERSION
              value: {{ $tag | quote }}
            - name: UI_THEME_COLOR
              valueFrom:
                configMapKeyRef:
                  name: api-pulse-config
                  key: UI_THEME_COLOR
            - name: AUTH_URL
              valueFrom:
                configMapKeyRef:
                  name: api-pulse-config
                  key: AUTH_URL
            - name: ANALYTICS_URL
              valueFrom:
                configMapKeyRef:
                  name: api-pulse-config
                  key: ANALYTICS_URL
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "api-pulse.versionedName" (dict "service" "web" "tag" $tag) }}
  labels:
    app: web
    version: {{ $tag | quote }}
spec:
  selector:
    app: web
    version: {{ $tag | quote }}
  ports:
    - port: {{ $root.Values.service.web.port }}
      targetPort: 80
      name: http
{{- end }}
