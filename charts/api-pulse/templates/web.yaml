apiVersion: apps/v1
kind: Deployment
metadata:
  name: web
  labels:
    app.kubernetes.io/name: {{ include "api-pulse.name" . }}
    app: web
spec:
  replicas: {{ .Values.replicaCount.web }}
  selector:
    matchLabels:
      app: web
  template:
    metadata:
      labels:
        app: web
    spec:
      {{- include "api-pulse.imagePullSecrets" . | nindent 6 }}
      containers:
        - name: web
          image: {{ include "api-pulse.web.image" . }}
          imagePullPolicy: {{ .Values.imagePullPolicy }}
          ports:
            - containerPort: 80
          env:
            - name: APP_VERSION
              valueFrom:
                configMapKeyRef:
                  name: api-pulse-config
                  key: UI_VERSION
            - name: UI_THEME_COLOR
              valueFrom:
                configMapKeyRef:
                  name: api-pulse-config
                  key: UI_THEME_COLOR
            - name: AUTH_URL
              valueFrom:
                configMapKeyRef:
                  name: api-pulse-config
                  key: AUTH_URL
            - name: ANALYTICS_URL
              valueFrom:
                configMapKeyRef:
                  name: api-pulse-config
                  key: ANALYTICS_URL
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 5
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              memory: 128Mi
---
apiVersion: v1
kind: Service
metadata:
  name: web
  labels:
    app: web
spec:
  selector:
    app: web
  ports:
    - port: {{ .Values.service.web.port }}
      targetPort: 80
      name: http
