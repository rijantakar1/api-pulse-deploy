# Docker Hub images produced by CI (cd-demo app repos).
# GitOps: CI sets images.<svc>.tag, versions.*, and appends to versionsActive.*.
imageRegistry: docker.io
imagePullPolicy: Always

# Set true + provide dockerHub credentials if Hub repos are private.
imagePullSecrets:
  enabled: false
  name: dockerhub-cred

dockerHub:
  username: ""
  # Prefer --set dockerHub.password=... or an existing secret; do not commit tokens.
  password: ""

images:
  web:
    repository: rajashekhar2390/api-pulse-web
    tag: latest
  auth:
    repository: rajashekhar2390/api-pulse-auth-service
    tag: latest
  analytics:
    repository: rajashekhar2390/api-pulse-analytics-service
    tag: latest
  mysql:
    repository: mysql
    # PVC was initialized with MySQL 9.7.x; minor downgrades are rejected by InnoDB.
    tag: "9.7"

replicaCount:
  web: 1
  auth: 1
  analytics: 1

# Default / global pins (ConfigMap + tenants.yaml global).
versions:
  auth: "latest"
  analytics: "latest"
  ui: "latest"

# Concurrent Deployments: one Deployment+Service per active tag.
# CI appends new tags (trimmed to versionsActiveMax); Odin can retire unused ones.
# K8s names: api-pulse-{svc}-{tag} (DNS-1123: lowercase, digits, hyphens).
versionsActive:
  web:
    - latest
  auth:
    - latest
  analytics:
    - latest

versionsActiveMax: 5

uiThemeColor: "#0F766E"

# Browser-reachable URLs (direct port-forward defaults).
# With Istio gateway (scripts/port-forward-istio.sh): use http://localhost:8080 for all
# and path prefixes /auth, /analytics — see docs/ODIN.md.
authUrl: "http://localhost:4001"
analyticsUrl: "http://localhost:4002"

mysql:
  rootPassword: root
  user: apipulse
  password: apipulse
  persistence:
    enabled: true
    size: 5Gi

jwtSecret: "dev-jwt-secret-change-me"

ingress:
  enabled: false
  className: nginx
  host: api-pulse.local

service:
  web:
    port: 80
  auth:
    port: 80
    targetPort: 4001
  analytics:
    port: 80
    targetPort: 4002
