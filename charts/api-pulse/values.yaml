# App images from Amazon ECR (CI pushes here).
# imageRegistry is set to <account>.dkr.ecr.<region>.amazonaws.com by
# scripts/ensure_ecr_registry.py (CI) or scripts/set-ecr-account.sh (local).
imageRegistry: REPLACE_ACCOUNT.dkr.ecr.us-west-2.amazonaws.com

ecr:
  accountId: "" # 12-digit AWS account ID (required for pulls)
  region: us-west-2

imagePullPolicy: Always

# ECR pull secret (refresh with scripts/refresh-ecr-pull-secret.sh — tokens expire ~12h).
imagePullSecrets:
  enabled: true
  name: ecr-pull

images:
  web:
    repository: api-pulse-web
    tag: latest
  auth:
    repository: api-pulse-auth-service
    tag: latest
  analytics:
    repository: api-pulse-analytics-service
    tag: latest
  mysql:
    repository: mysql
    # Public Hub image; PVC was initialized with MySQL 9.7.x.
    tag: "9.7"

replicaCount:
  web: 1
  auth: 1
  analytics: 1

# Default / global pins (ConfigMap + tenants.yaml global).
versions:
  auth: "latest"
  analytics: "latest"
  ui: "latest"

# Concurrent Deployments: one Deployment+Service per active tag.
versionsActive:
  web:
    - latest
  auth:
    - latest
  analytics:
    - latest

versionsActiveMax: 5

uiThemeColor: "#0F766E"

authUrl: "http://localhost:4001"
analyticsUrl: "http://localhost:4002"

mysql:
  rootPassword: root
  user: apipulse
  password: apipulse
  persistence:
    enabled: true
    size: 5Gi

jwtSecret: "dev-jwt-secret-change-me"

ingress:
  enabled: false
  className: nginx
  host: api-pulse.local

service:
  web:
    port: 80
  auth:
    port: 80
    targetPort: 4001
  analytics:
    port: 80
    targetPort: 4002
