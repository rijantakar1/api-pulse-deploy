# App images from Amazon ECR (CI pushes here).
# imageRegistry is set to <account>.dkr.ecr.<region>.amazonaws.com by
# scripts/ensure_ecr_registry.py (CI) or scripts/set-ecr-account.sh (local).
imageRegistry: 253155928537.dkr.ecr.us-east-1.amazonaws.com

ecr:
  accountId: "253155928537"
  region: us-east-1

imagePullPolicy: Always

# ECR pull secret (refresh with scripts/refresh-ecr-pull-secret.sh — tokens expire ~12h).
imagePullSecrets:
  enabled: true
  name: ecr-pull

images:
  web:
    repository: api-pulse-web
    tag: 20260716-95eeb68
  auth:
    repository: api-pulse-auth-service
    tag: 20260716-945376a
  analytics:
    repository: api-pulse-analytics-service
    tag: 20260716-567591d
  mysql:
    repository: mysql
    # Public Hub image; PVC was initialized with MySQL 9.7.x.
    tag: "9.7"

replicaCount:
  web: 1
  auth: 1
  analytics: 1

# Default / global pins (ConfigMap + tenants.yaml global).
versions:
  auth: "20260716-945376a"
  analytics: "20260716-567591d"
  ui: "20260716-95eeb68"

# Concurrent Deployments: one Deployment+Service per active tag.
versionsActive:
  web:
    - "latest"
    - "feature-ecr-canary-demo-ce93aa7"
    - "20260716-95eeb68"
  auth:
    - "latest"
    - "20260716-945376a"
  analytics:
    - "latest"
    - "20260716-567591d"

versionsActiveMax: 5

uiThemeColor: "#0F766E"

authUrl: "http://localhost:8080/auth"
analyticsUrl: "http://localhost:8080/analytics"

mysql:
  rootPassword: root
  user: apipulse
  password: apipulse
  persistence:
    enabled: true
    size: 5Gi

jwtSecret: "dev-jwt-secret-change-me"

ingress:
  enabled: false
  className: nginx
  host: api-pulse.local

service:
  web:
    port: 80
  auth:
    port: 80
    targetPort: 4001
  analytics:
    port: 80
    targetPort: 4002
