apiVersion: odin.cd-demo.io/v1
kind: TenantRouting
metadata:
  name: api-pulse
spec:
  services:
    - name: web
      k8sServicePrefix: api-pulse-web
      port: 80
      # Gateway path prefix (empty = root). Auth/analytics use strip-prefix rewrite.
      gatewayPath: /
    - name: auth
      k8sServicePrefix: api-pulse-auth
      port: 80
      gatewayPath: /auth
    - name: analytics
      k8sServicePrefix: api-pulse-analytics
      port: 80
      gatewayPath: /analytics
  # Global defaults — must exist in charts/api-pulse values versionsActive.*
  global:
    web: "latest"
    auth: "latest"
    analytics: "latest"
  # Per-tenant overrides (only list services that differ from global).
  tenants:
    acme: {}
    globex: {}
