apiVersion: v1
kind: ConfigMap
metadata:
  name: api-pulse-config
  namespace: api-pulse
data:
  DB_HOST: "mysql"
  DB_PORT: "3306"
  DB_USER: "apipulse"
  REGISTRY_DB: "api_pulse_registry"
  AUTH_VERSION: "1.0.0"
  ANALYTICS_VERSION: "1.0.0"
  UI_VERSION: "1.0.0"
  UI_THEME_COLOR: "#0F766E"
  # Browser-reachable URLs for scripts/port-forward.sh (Minikube Docker/Mac).
  # For Ingress (api-pulse.local) instead, use:
  #   AUTH_URL: "http://api-pulse.local/auth"
  #   ANALYTICS_URL: "http://api-pulse.local/analytics"
  AUTH_URL: "http://localhost:4001"
  ANALYTICS_URL: "http://localhost:4002"
