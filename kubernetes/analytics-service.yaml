apiVersion: apps/v1
kind: Deployment
metadata:
  name: analytics-service
  namespace: api-pulse
  labels:
    app: analytics-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: analytics-service
  template:
    metadata:
      labels:
        app: analytics-service
    spec:
      containers:
        - name: analytics-service
          image: rajashekhar2390/api-pulse-analytics-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 4002
          env:
            - name: PORT
              value: "4002"
            - name: ANALYTICS_VERSION
              valueFrom:
                configMapKeyRef:
                  name: api-pulse-config
                  key: ANALYTICS_VERSION
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: api-pulse-config
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: api-pulse-config
                  key: DB_PORT
            - name: DB_USER
              valueFrom:
                configMapKeyRef:
                  name: api-pulse-config
                  key: DB_USER
            - name: REGISTRY_DB
              valueFrom:
                configMapKeyRef:
                  name: api-pulse-config
                  key: REGISTRY_DB
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: api-pulse-secrets
                  key: DB_PASSWORD
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: api-pulse-secrets
                  key: JWT_SECRET
          readinessProbe:
            httpGet:
              path: /health
              port: 4002
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: 4002
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: analytics-service
  namespace: api-pulse
spec:
  selector:
    app: analytics-service
  ports:
    - port: 80
      targetPort: 4002
      name: http
