# Local full-stack for API Pulse — pulls the same Docker Hub images CI publishes.
#
#   docker compose pull && docker compose up -d
#
# To build locally from sibling source repos instead, set COMPOSE_PROFILES=build
# or use docker-compose.build.yml overrides.

name: api-pulse

services:
  mysql:
    image: mysql:8.4
    container_name: api-pulse-mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: apipulse
      MYSQL_PASSWORD: apipulse
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-uroot", "-proot"]
      interval: 5s
      timeout: 5s
      retries: 20

  auth-service:
    image: ${ECR_REGISTRY:-rajashekhar2390}/api-pulse-auth-service:${IMAGE_TAG:-latest}
    container_name: api-pulse-auth
    environment:
      PORT: 4001
      AUTH_VERSION: ${AUTH_VERSION:-1.0.0}
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-change-me}
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: apipulse
      DB_PASSWORD: apipulse
      REGISTRY_DB: api_pulse_registry
    ports:
      - "4001:4001"
    depends_on:
      mysql:
        condition: service_healthy

  analytics-service:
    image: ${ECR_REGISTRY:-rajashekhar2390}/api-pulse-analytics-service:${IMAGE_TAG:-latest}
    container_name: api-pulse-analytics
    environment:
      PORT: 4002
      ANALYTICS_VERSION: ${ANALYTICS_VERSION:-1.0.0}
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-change-me}
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: apipulse
      DB_PASSWORD: apipulse
      REGISTRY_DB: api_pulse_registry
    ports:
      - "4002:4002"
    depends_on:
      mysql:
        condition: service_healthy

  web:
    image: ${ECR_REGISTRY:-rajashekhar2390}/api-pulse-web:${IMAGE_TAG:-latest}
    container_name: api-pulse-web
    environment:
      APP_VERSION: ${UI_VERSION:-1.0.0}
      UI_THEME_COLOR: ${UI_THEME_COLOR:-#0F766E}
      AUTH_URL: ${AUTH_PUBLIC_URL:-http://localhost:4001}
      ANALYTICS_URL: ${ANALYTICS_PUBLIC_URL:-http://localhost:4002}
    ports:
      - "8080:80"
    depends_on:
      - auth-service
      - analytics-service

volumes:
  mysql_data:
